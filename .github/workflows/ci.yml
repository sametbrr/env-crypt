name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Syntax & Smoke Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: ['18', '20', '22']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Check JS syntax
        shell: bash
        run: |
          node --check bin/crypt-sync.js
          for f in cmd/*.js lib/*.js scripts/postinstall.js; do node --check "$f"; done

      - name: Install (skip postinstall in CI — no age needed for syntax check)
        run: npm install --ignore-scripts

      - name: Version smoke test
        run: node bin/crypt-sync.js --version
